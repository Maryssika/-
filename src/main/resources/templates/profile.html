<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Мой профиль</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="fragments/header :: header"></div>

<div class="container mt-5">
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h3>Мой профиль</h3>
                </div>
                <div class="card-body">
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <strong>ФИО:</strong>
                        </div>
                        <div class="col-md-8" th:text="${user.fullName}">
                            Имя пользователя
                        </div>
                    </div>
                    <div class="mb-2">
                        <strong>Роль:</strong>
                        <span th:text="${user.role.displayName}">Ученик</span>
                    </div>
                    <div class="mb-2" th:if="${user.role.name() == 'STUDENT' and user.disabilityType != null}">
                        <strong>Тип нарушения:</strong>
                        <span th:text="${user.disabilityType.displayName}">Нарушение зрения</span>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <strong>Email:</strong>
                        </div>
                        <div class="col-md-8" th:text="${user.email}">
                            email@example.com
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <strong>Роль:</strong>
                        </div>
                        <div class="col-md-8" th:text="${user.role.displayName}">
                            Роль
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <strong>Дата регистрации:</strong>
                        </div>
                        <div class="col-md-8" th:text="${#dates.format(user.createdAt, 'dd.MM.yyyy HH:mm')}">
                            01.01.2024
                        </div>
                    </div>

                    <div class="mt-4">
                        <a href="/" class="btn btn-secondary">На главную</a>
                        <form th:action="@{/logout}" method="post" style="display: inline;">
                            <button type="submit" class="btn btn-danger">Выйти</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="card mt-4" th:if="${user.role.name() == 'STUDENT'}">
                <div class="card-header bg-success text-white">
                    <h4>Мои достижения</h4>
                </div>
                <div class="card-body">
                    <p>Здесь будут отображаться ваши достижения в обучении.</p>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
