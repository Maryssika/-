<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Настройки доступности</title>
  <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .settings-container {
        max-width: 600px;
        width: 100%;
        background: white;
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        overflow: hidden;
        animation: slideIn 0.5s ease-out;
    }
    @keyframes slideIn {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    .settings-header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 30px 40px;
    }
    .settings-header h1 {
        font-size: 2.2em;
        margin-bottom: 10px;
    }
    .settings-header p {
        opacity: 0.9;
    }
    .settings-content {
        padding: 40px;
    }
    .success-message {
        background: #d4edda;
        color: #155724;
        padding: 12px;
        border-radius: 8px;
        margin-bottom: 20px;
        border-left: 5px solid #28a745;
    }
    .form-group {
        margin-bottom: 25px;
    }
    .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: #333;
    }
    .form-group input[type="text"],
    .form-group input[type="password"],
    .form-group select {
        width: 100%;
        padding: 12px;
        border: 2px solid #e9ecef;
        border-radius: 8px;
        font-size: 1em;
        transition: border-color 0.3s;
    }
    .form-group input:focus,
    .form-group select:focus {
        outline: none;
        border-color: #667eea;
    }
    .checkbox-group {
        display: flex;
        align-items: center;
        gap: 10px;
    }
    .checkbox-group input[type="checkbox"] {
        width: 20px;
        height: 20px;
        cursor: pointer;
    }
    .checkbox-group label {
        margin-bottom: 0;
        cursor: pointer;
    }
    .btn-save {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        padding: 15px 30px;
        border-radius: 50px;
        font-size: 1.1em;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
        width: 100%;
        box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }
    .btn-save:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(102, 126, 234, 0.6);
    }
    .back-link {
        display: inline-block;
        margin-top: 20px;
        color: #667eea;
        text-decoration: none;
        font-weight: 600;
    }
    .back-link:hover {
        text-decoration: underline;
    }
    @media (max-width: 768px) {
        .settings-header h1 {
            font-size: 1.8em;
        }
        .settings-content {
            padding: 20px;
        }
    }
  </style>
</head>
<body>
<div class="settings-container">
  <div class="settings-header">
    <h1>⚙️ Настройки доступности</h1>
    <p>Настрой интерфейс под свои потребности</p>
  </div>
  <div class="settings-content">
    <div class="success-message" th:if="${successMessage}" th:text="${successMessage}"></div>
    <div class="error-message" th:if="${errorMessage}" th:text="${errorMessage}" style="background: #f8d7da; color: #721c24; padding: 12px; border-radius: 8px; margin-bottom: 20px; border-left: 5px solid #f5c6cb;"></div>

    <form action="/settings/update" method="post">
      <!-- Личные данные -->
      <div class="form-group">
        <label for="fullName">ФИО</label>
        <input type="text" id="fullName" name="fullName" th:value="${user.fullName}" placeholder="Введите ФИО">
      </div>
      <div class="form-group">
        <label for="newPassword">Новый пароль (оставьте пустым, если не хотите менять)</label>
        <input type="password" id="newPassword" name="newPassword" placeholder="Минимум 8 символов">
      </div>
      <div class="form-group">
        <label for="confirmPassword">Подтвердите новый пароль</label>
        <input type="password" id="confirmPassword" name="confirmPassword">
      </div>

      <!-- Настройки доступности -->
      <h3 style="margin: 20px 0 10px; color: #333;">Настройки отображения</h3>
      <div class="form-group checkbox-group">
        <input type="checkbox" id="highContrast" name="highContrast" th:checked="${user.accessibilityProfile != null ? user.accessibilityProfile.highContrast : false}">
        <label for="highContrast">Высокий контраст</label>
      </div>
      <div class="form-group checkbox-group">
        <input type="checkbox" id="subtitles" name="subtitles" th:checked="${user.accessibilityProfile != null ? user.accessibilityProfile.subtitlesEnabled : false}">
        <label for="subtitles">Субтитры (для видео/аудио)</label>
      </div>
      <div class="form-group checkbox-group">
        <input type="checkbox" id="screenReader" name="screenReader" th:checked="${user.accessibilityProfile != null ? user.accessibilityProfile.screenReaderEnabled : false}">
        <label for="screenReader">Поддержка экранного чтеца</label>
      </div>

      <div class="form-group">
        <label for="fontSize">Размер шрифта</label>
        <select id="fontSize" name="fontSize">
          <option value="small" th:selected="${user.accessibilityProfile != null and user.accessibilityProfile.fontSize == 'small'}">Мелкий</option>
          <option value="medium" th:selected="${user.accessibilityProfile == null or user.accessibilityProfile.fontSize == 'medium'}">Средний</option>
          <option value="large" th:selected="${user.accessibilityProfile != null and user.accessibilityProfile.fontSize == 'large'}">Крупный</option>
          <option value="x-large" th:selected="${user.accessibilityProfile != null and user.accessibilityProfile.fontSize == 'x-large'}">Очень крупный</option>
        </select>
      </div>

      <div class="form-group">
        <label for="colorScheme">Цветовая схема</label>
        <select id="colorScheme" name="colorScheme">
          <option value="default" th:selected="${user.accessibilityProfile == null or user.accessibilityProfile.colorScheme == 'default'}">По умолчанию</option>
          <option value="dark" th:selected="${user.accessibilityProfile != null and user.accessibilityProfile.colorScheme == 'dark'}">Тёмная</option>
          <option value="blue" th:selected="${user.accessibilityProfile != null and user.accessibilityProfile.colorScheme == 'blue'}">Синяя (для слабовидящих)</option>
        </select>
      </div>

      <button type="submit" class="btn-save">Сохранить изменения</button>
    </form>

    <!-- Изменённая ссылка "Вернуться в дашборд" на "← Назад к заданиям" (или как вам удобно) -->
    <a href="/student/dashboard" class="back-link">← Назад к заданиям</a>
  </div>
</div>
</body>
</html>
