<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Вход в систему</title>
  <style>
    body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: Arial, sans-serif;
    }

    .login-container {
        background: white;
        border-radius: 10px;
        padding: 40px;
        width: 100%;
        max-width: 400px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .login-container h2 {
        text-align: center;
        color: #333;
        margin-bottom: 30px;
    }

    .form-group {
        margin-bottom: 20px;
    }

    .form-group label {
        display: block;
        margin-bottom: 5px;
        color: #555;
    }

    .form-group input {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 5px;
        font-size: 16px;
    }

    .btn-login {
        width: 100%;
        padding: 12px;
        background: #667eea;
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        cursor: pointer;
        transition: background 0.3s;
    }

    .btn-login:hover {
        background: #5a6fd8;
    }

    .links {
        text-align: center;
        margin-top: 20px;
    }

    .links a {
        color: #667eea;
        text-decoration: none;
        margin: 0 10px;
    }

    .role-selector {
        display: flex;
        margin-bottom: 20px;
        border: 1px solid #ddd;
        border-radius: 5px;
        overflow: hidden;
    }

    .role-btn {
        flex: 1;
        padding: 10px;
        text-align: center;
        cursor: pointer;
        background: #f8f9fa;
        border: none;
    }

    .role-btn.active {
        background: #667eea;
        color: white;
    }

    .error {
        color: #dc3545;
        text-align: center;
        margin-bottom: 15px;
    }
  </style>
</head>
<body>
<div class="login-container">
  <h2>🔐 Вход в систему</h2>

  <div class="role-selector">
    <button class="role-btn active" onclick="selectRole('teacher')">Педагог</button>
    <button class="role-btn" onclick="selectRole('parent')">Родитель</button>
    <button class="role-btn" onclick="selectRole('student')">Ученик</button>
  </div>

  <form action="/login" method="post">
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required placeholder="vasya@example.com">
    </div>

    <div class="form-group">
      <label for="password">Пароль</label>
      <input type="password" id="password" name="password" required placeholder="Введите пароль">
    </div>

    <div class="form-group" style="display: flex; align-items: center;">
      <input type="checkbox" id="remember" name="remember" style="width: auto; margin-right: 10px;">
      <label for="remember" style="margin: 0;">Запомнить меня</label>
    </div>

    <button type="submit" class="btn-login">Войти</button>
  </form>

  <div class="links">
    <a href="/register">Зарегистрироваться</a>
    <a href="/">На главную</a>
  </div>
</div>

<script>
  function selectRole(role) {
      document.querySelectorAll('.role-btn').forEach(btn => {
          btn.classList.remove('active');
      });
      event.target.classList.add('active');
  }
</script>
</body>
</html>
