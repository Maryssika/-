<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Регистрация успешна</title>
  <style>
    body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: Arial, sans-serif;
        text-align: center;
        color: white;
    }

    .success-box {
        background: white;
        color: #333;
        padding: 40px;
        border-radius: 10px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        max-width: 500px;
    }

    .success-icon {
        font-size: 60px;
        color: #28a745;
        margin-bottom: 20px;
    }

    .btn {
        display: inline-block;
        padding: 10px 20px;
        background: #667eea;
        color: white;
        text-decoration: none;
        border-radius: 5px;
        margin: 10px;
    }
  </style>
</head>
<body>
<div class="success-box">
  <div class="success-icon">✓</div>
  <h1>Регистрация успешна! 🎉</h1>
  <p>Ваш аккаунт успешно создан. Теперь вы можете войти в систему.</p>

  <div style="margin: 30px 0;">
    <a href="/login" class="btn">Войти в систему</a>
    <a href="/" class="btn" style="background: #6c757d;">На главную</a>
  </div>

  <p style="color: #666; font-size: 14px;">
    Если у вас возникли проблемы, напишите на support@ovz-platform.ru
  </p>
</div>
</body>
</html>
