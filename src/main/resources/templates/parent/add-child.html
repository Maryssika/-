<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Привязать ребёнка</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<!-- Навигация (можно вынести в фрагмент) -->
<nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">ОВЗ Платформа</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="/parent/dashboard">Панель родителя</a></li>
                <li class="nav-item"><a class="nav-link" href="/profile">Профиль</a></li>
                <li class="nav-item"><a class="nav-link" href="/settings">Настройки</a></li>
                <li class="nav-item"><a class="nav-link" href="/notifications">Уведомления</a></li>
                <li class="nav-item"><a class="nav-link" href="/logout">Выйти</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h1>Привязать ребёнка</h1>
    <p class="lead">Введите email ученика, которого хотите привязать к своему аккаунту.</p>

    <form method="post" th:action="@{/parent/add-child}">
        <div class="mb-3">
            <label for="childEmail" class="form-label">Email ученика</label>
            <input type="email" class="form-control" id="childEmail" name="childEmail" required>
        </div>
        <button type="submit" class="btn btn-primary">Привязать</button>
        <a href="/parent/dashboard" class="btn btn-secondary">Отмена</a>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
