<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Восстановление пароля</title>
  <style>
    body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: Arial, sans-serif; }
    .container { background: white; border-radius: 10px; padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
    h2 { text-align: center; }
    .form-group { margin-bottom: 20px; }
    input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
    button { width: 100%; padding: 12px; background: #667eea; color: white; border: none; border-radius: 5px; cursor: pointer; }
    .message { margin-top: 15px; text-align: center; color: green; }
    .error { color: red; }
  </style>
</head>
<body>
<div class="container">
  <h2>Восстановление пароля</h2>
  <form action="/forgot-password" method="post">
    <div class="form-group">
      <input type="email" name="email" placeholder="Ваш email" required>
    </div>
    <button type="submit">Отправить ссылку для сброса</button>
  </form>
  <div th:if="${message}" class="message" th:text="${message}"></div>
  <div th:if="${error}" class="error" th:text="${error}"></div>
  <div style="text-align: center; margin-top: 20px;"><a href="/login">Вернуться ко входу</a></div>
</div>
</body>
</html>
