<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Форма пользователя</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
  <h2 th:text="${userId != null ? 'Редактирование пользователя' : 'Создание пользователя'}">Форма</h2>

  <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
  <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

  <form th:action="@{${userId != null ? '/admin/users/update/' + userId : '/admin/users/create'}}"
        th:object="${userDto}" method="post">
    <div class="mb-3">
      <label for="email" class="form-label">Email</label>
      <input type="email" class="form-control" id="email" th:field="*{email}" required>
      <div th:if="${#fields.hasErrors('email')}" class="text-danger" th:errors="*{email}"></div>
    </div>
    <div class="mb-3">
      <label for="fullName" class="form-label">ФИО</label>
      <input type="text" class="form-control" id="fullName" th:field="*{fullName}" required>
      <div th:if="${#fields.hasErrors('fullName')}" class="text-danger" th:errors="*{fullName}"></div>
    </div>
    <div class="mb-3">
      <label for="password" class="form-label">Пароль (оставьте пустым, чтобы не менять)</label>
      <input type="password" class="form-control" id="password" th:field="*{password}">
      <div th:if="${#fields.hasErrors('password')}" class="text-danger" th:errors="*{password}"></div>
    </div>
    <div class="mb-3">
      <label for="confirmPassword" class="form-label">Подтверждение пароля</label>
      <input type="password" class="form-control" id="confirmPassword" th:field="*{confirmPassword}">
      <div th:if="${#fields.hasErrors('confirmPassword')}" class="text-danger" th:errors="*{confirmPassword}"></div>
    </div>
    <div class="mb-3">
      <label for="role" class="form-label">Роль</label>
      <select class="form-select" id="role" th:field="*{role}" required>
        <option value="">Выберите роль</option>
        <option th:each="r : ${roles}" th:value="${r.name()}" th:text="${r.displayName}"></option>
      </select>
      <div th:if="${#fields.hasErrors('role')}" class="text-danger" th:errors="*{role}"></div>
    </div>
    <div class="mb-3">
      <label for="disabilityType" class="form-label">Тип нарушения (для учеников)</label>
      <select class="form-select" id="disabilityType" th:field="*{disabilityType}">
        <option value="">Не указано</option>
        <option th:each="dt : ${disabilityTypes}" th:value="${dt.name()}" th:text="${dt.displayName}"></option>
      </select>
    </div>
    <button type="submit" class="btn btn-primary">Сохранить</button>
    <a th:href="@{/admin/dashboard}" class="btn btn-secondary">Отмена</a>
  </form>
</div>
</body>
</html>
