<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Сброс пароля</title>
  <style>/* аналогично forgot-password */</style>
</head>
<body>
<div class="container">
  <h2>Создание нового пароля</h2>
  <form action="/reset-password" method="post">
    <input type="hidden" name="token" th:value="${token}">
    <div class="form-group">
      <input type="password" name="password" placeholder="Новый пароль (мин. 8 символов)" required>
    </div>
    <div class="form-group">
      <input type="password" name="confirmPassword" placeholder="Подтвердите пароль" required>
    </div>
    <button type="submit">Сохранить пароль</button>
  </form>
  <div th:if="${errorMessage}" class="error" th:text="${errorMessage}"></div>
  <div th:if="${successMessage}" class="message" th:text="${successMessage}"></div>
</div>
</body>
</html>
