<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${task.title}">Задание</title>
  <style>
    /* (те же стили, что и в предыдущей версии, плюс новые для формы) */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .task-container {
        max-width: 900px;
        width: 100%;
        background: white;
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        overflow: hidden;
        animation: slideIn 0.5s ease-out;
    }
    @keyframes slideIn {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    .task-header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 30px 40px;
    }
    .task-header h1 {
        font-size: 2.5em;
        margin-bottom: 10px;
        font-weight: 600;
    }
    .task-meta {
        display: flex;
        gap: 20px;
        font-size: 1.1em;
        opacity: 0.9;
    }
    .task-meta span {
        background: rgba(255,255,255,0.2);
        padding: 5px 15px;
        border-radius: 50px;
    }
    .task-content {
        padding: 40px;
    }
    .task-description {
        font-size: 1.2em;
        line-height: 1.6;
        color: #333;
        margin-bottom: 30px;
        background: #f8f9fa;
        padding: 20px;
        border-radius: 10px;
        border-left: 5px solid #667eea;
    }
    .task-media {
        margin: 30px 0;
        text-align: center;
        background: #f1f3f5;
        padding: 30px;
        border-radius: 15px;
    }
    .task-media img {
        max-width: 100%;
        max-height: 400px;
        border-radius: 10px;
        box-shadow: 0 5px 20px rgba(0,0,0,0.2);
    }
    .task-media video, .task-media audio {
        max-width: 100%;
        outline: none;
    }
    .task-media audio {
        width: 100%;
        margin-top: 20px;
    }
    .alternative-text {
        margin-top: 15px;
        font-style: italic;
        color: #666;
        background: #e9ecef;
        padding: 10px;
        border-radius: 5px;
    }
    /* Форма ответа */
    .answer-form {
        margin: 30px 0;
        padding: 20px;
        background: #f8f9fa;
        border-radius: 10px;
        border: 1px solid #dee2e6;
    }
    .answer-form h3 {
        margin-bottom: 15px;
        color: #333;
    }
    .form-group {
        margin-bottom: 15px;
    }
    .form-group label {
        display: block;
        margin-bottom: 5px;
        font-weight: 600;
        color: #555;
    }
    .form-control {
        width: 100%;
        padding: 12px;
        border: 2px solid #e9ecef;
        border-radius: 8px;
        font-size: 1em;
        transition: border-color 0.3s;
    }
    .form-control:focus {
        outline: none;
        border-color: #667eea;
    }
    .btn-submit {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        padding: 12px 30px;
        border-radius: 50px;
        font-size: 1.1em;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
        box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }
    .btn-submit:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(102, 126, 234, 0.6);
    }
    .success-message {
        background: #d4edda;
        color: #155724;
        padding: 12px;
        border-radius: 8px;
        margin-bottom: 20px;
        border-left: 5px solid #28a745;
    }
    .task-actions {
        display: flex;
        justify-content: space-between;
        margin-top: 30px;
    }
    .btn {
        padding: 12px 30px;
        border: none;
        border-radius: 50px;
        font-size: 1.1em;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
        text-decoration: none;
        display: inline-block;
    }
    .btn-primary {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }
    .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(102, 126, 234, 0.6);
    }
    .btn-secondary {
        background: #f8f9fa;
        color: #333;
        border: 1px solid #dee2e6;
    }
    .btn-secondary:hover {
        background: #e9ecef;
    }
    .btn-success {
        background: #28a745;
        color: white;
    }
    .btn-success:hover {
        background: #218838;
    }
    .error-message {
        background: #f8d7da;
        color: #721c24;
        padding: 20px;
        border-radius: 10px;
        border-left: 5px solid #f5c6cb;
        margin: 20px 0;
    }
    @media (max-width: 768px) {
        .task-header h1 {
            font-size: 1.8em;
        }
        .task-content {
            padding: 20px;
        }
        .task-actions {
            flex-direction: column;
            gap: 10px;
        }
        .btn {
            text-align: center;
        }
    }
  </style>
</head>
<body>
<div class="task-container" th:if="${task != null}">
  <div class="task-header">
    <h1 th:text="${task.title}">Название задания</h1>
    <div class="task-meta">
      <span th:text="${task.category}">Категория</span>
      <span th:if="${task.difficultyLevel != null}">
                    Сложность: <span th:text="${task.difficultyLevel}">1</span>/5
                </span>
    </div>
  </div>

  <div class="task-content">
    <!-- Сообщение об успехе после отправки ответа -->
    <div class="success-message" th:if="${param.success}" th:text="'Ответ отправлен!'"></div>

    <div class="task-description" th:text="${task.description}">
      Описание задания
    </div>

    <div class="task-media" th:if="${task.mediaUrl != null}">
      <!-- Изображение -->
      <img th:if="${#strings.endsWith(task.mediaUrl, '.jpg') or
                               #strings.endsWith(task.mediaUrl, '.jpeg') or
                               #strings.endsWith(task.mediaUrl, '.png') or
                               #strings.endsWith(task.mediaUrl, '.gif')}"
           th:src="${task.mediaUrl}"
           th:alt="${task.alternativeText ?: 'Изображение к заданию'}"
           loading="lazy">

      <!-- Видео -->
      <video th:if="${#strings.endsWith(task.mediaUrl, '.mp4') or
                               #strings.endsWith(task.mediaUrl, '.webm') or
                               #strings.endsWith(task.mediaUrl, '.ogg')}"
             th:src="${task.mediaUrl}"
             controls
             preload="metadata"
             style="max-width: 100%; max-height: 400px;">
        Ваш браузер не поддерживает видео.
      </video>

      <!-- Аудио -->
      <audio th:if="${#strings.endsWith(task.mediaUrl, '.mp3') or
                               #strings.endsWith(task.mediaUrl, '.wav') or
                               #strings.endsWith(task.mediaUrl, '.ogg')}"
             th:src="${task.mediaUrl}"
             controls
             preload="metadata">
        Ваш браузер не поддерживает аудио.
      </audio>

      <div class="alternative-text" th:if="${task.alternativeText != null}"
           th:text="${task.alternativeText}">
        Альтернативный текст
      </div>
    </div>

    <!-- Форма для ответа -->
    <div class="answer-form">
      <h3>Твой ответ:</h3>
      <form th:action="@{/task/{id}/answer(id=${task.id})}" method="post">
        <div class="form-group">
          <label for="answer">Введи ответ:</label>
          <input type="text" id="answer" name="answer" class="form-control" required>
        </div>
        <button type="submit" class="btn-submit">Отправить ответ</button>
      </form>
    </div>

    <!-- Кнопки навигации -->
    <div class="task-actions">
      <a href="javascript:history.back()" class="btn btn-secondary">← Назад к заданиям</a>
      <a th:if="${nextTaskId != null}" th:href="@{/task/{id}(id=${nextTaskId})}" class="btn btn-primary">Следующее задание →</a>
      <a th:if="${nextTaskId == null}" href="/student/dashboard" class="btn btn-success">Завершить (все задания выполнены)</a>
    </div>
  </div>
</div>

<!-- Сообщение об ошибке, если задача не найдена -->
<div class="task-container" th:if="${error != null}">
  <div class="task-header" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">
    <h1>Ошибка</h1>
  </div>
  <div class="task-content">
    <div class="error-message" th:text="${error}">
      Задание не найдено
    </div>
    <div class="task-actions">
      <a href="javascript:history.back()" class="btn btn-secondary">← Назад</a>
    </div>
  </div>
</div>
</body>
</html>
