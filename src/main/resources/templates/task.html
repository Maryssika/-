<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
  <meta charset="UTF-8">
  <title th:text="${task.title} + ' | Задание'">Задание</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { font-size: 1.1rem; line-height: 1.6; background-color: #f9fbfd; }
    .task-container { max-width: 800px; margin: 0 auto; padding: 2rem; }
  </style>
</head>
<body>
<a href="#main-content" class="visually-hidden-focusable btn btn-primary position-absolute m-3">Перейти к содержанию</a>

<nav class="navbar navbar-expand-lg bg-white py-3">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/">
      <i class="bi bi-book-half me-2"></i>ОВЗ Платформа
    </a>
    <a href="/student/dashboard" class="btn btn-outline-primary rounded-pill">
      <i class="bi bi-arrow-left me-2"></i>Назад к панели
    </a>
  </div>
</nav>

<main id="main-content" class="container my-5">
  <div class="task-container bg-white p-5 rounded-4 shadow">
    <h1 class="display-5 fw-bold mb-4" th:text="${task.title}">Название задания</h1>

    <div class="mb-4">
      <span class="badge bg-secondary fs-6 me-2" th:text="${task.category}">Категория</span>
      <span class="badge bg-info fs-6" th:text="'Уровень сложности: ' + ${task.difficultyLevel}">Сложность: 1</span>
    </div>

    <p class="fs-4 text-secondary mb-4" th:text="${task.description}">Описание задания</p>

    <!-- Если есть медиа-файл (видео, аудио, изображение) -->
    <div th:if="${task.mediaUrl}" class="mb-4">
      <video th:if="${task.mediaUrl.contains('.mp4')}" th:src="${task.mediaUrl}" controls class="w-100 rounded"></video>
      <audio th:if="${task.mediaUrl.contains('.mp3')}" th:src="${task.mediaUrl}" controls class="w-100"></audio>
      <img th:if="${task.mediaUrl.contains('.jpg') or task.mediaUrl.contains('.png')}"
           th:src="${task.mediaUrl}" th:alt="${task.alternativeText}" class="img-fluid rounded">
    </div>

    <!-- Блок выполнения задания (заглушка) -->
    <div class="alert alert-info mt-4">
      <i class="bi bi-info-circle-fill me-2"></i>
      Здесь будет интерфейс выполнения задания (тест, перетаскивание и т.д.).
    </div>

    <div class="d-flex justify-content-between mt-5">
      <a href="/student/dashboard" class="btn btn-outline-secondary rounded-pill px-4">
        <i class="bi bi-arrow-left me-2"></i>Назад
      </a>
      <button class="btn btn-success rounded-pill px-4" onclick="alert('Ответ отправлен!')">
        Отправить ответ
      </button>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
