<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Список заданий</title>
  <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 2rem 1rem;
    }
    .container {
        max-width: 1200px;
        margin: 0 auto;
        background: white;
        border-radius: 1.5rem;
        box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        padding: 2rem;
        animation: fadeIn 0.5s ease;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
    h1 { color: #2d3748; margin-bottom: 1.5rem; border-left: 4px solid #667eea; padding-left: 1rem; }
    .btn {
        display: inline-block;
        padding: 0.5rem 1rem;
        border-radius: 2rem;
        text-decoration: none;
        font-weight: 600;
        transition: 0.2s;
        border: none;
        cursor: pointer;
        background: #f7fafc;
        color: #4a5568;
    }
    .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(102,126,234,0.4); }
    .btn-warning { background: #ed8936; color: white; }
    .btn-warning:hover { background: #dd6b20; }
    .btn-danger { background: #f56565; color: white; }
    .btn-danger:hover { background: #e53e3e; }
    .table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 1.5rem;
    }
    .table th, .table td {
        padding: 0.75rem;
        text-align: left;
        border-bottom: 1px solid #e2e8f0;
    }
    .table th {
        background: #f7fafc;
        font-weight: 600;
    }
    .table tr:hover { background: #fefcbf; }
    .actions { margin-bottom: 1rem; }
    @media (max-width: 768px) {
        .table, .table thead, .table tbody, .table tr, .table td { display: block; }
        .table thead { display: none; }
        .table tr { margin-bottom: 1rem; border: 1px solid #e2e8f0; border-radius: 0.75rem; padding: 0.5rem; }
        .table td { display: flex; justify-content: space-between; padding: 0.5rem; border-bottom: 1px solid #edf2f7; }
        .table td::before { content: attr(data-label); font-weight: 600; width: 40%; }
    }
  </style>
</head>
<body>
<div class="container">
  <h1>📚 Все задания</h1>
  <div class="actions">
    <a th:href="@{/teacher/create-task}" class="btn btn-primary">➕ Создать новое задание</a>
    <a th:href="@{/teacher/dashboard}" class="btn">← Назад в панель</a>
  </div>
  <div th:if="${tasks.isEmpty()}" class="alert alert-info">Пока нет ни одного задания. Создайте первое!</div>
  <div th:unless="${tasks.isEmpty()}">
    <table class="table">
      <thead>
      <tr><th>Название</th><th>Категория</th><th>Сложность</th><th>Действия</th></tr>
      </thead>
      <tbody>
      <tr th:each="task : ${tasks}">
        <td data-label="Название" th:text="${task.title}"></td>
        <td data-label="Категория" th:text="${task.category}"></td>
        <td data-label="Сложность" th:text="${task.difficultyLevel}"></td>
        <td data-label="Действия">
          <a th:href="@{/teacher/edit-task/{id}(id=${task.id})}" class="btn btn-warning" style="font-size:0.8rem;">✏️ Редактировать</a>
          <form method="post" th:action="@{/teacher/delete-task/{id}(id=${task.id})}" style="display:inline;">
            <button type="submit" class="btn btn-danger" style="font-size:0.8rem;" onclick="return confirm('Удалить задание?')">🗑 Удалить</button>
          </form>
        </td>
      </tr>
      </tbody>
    </table>
  </div>
</div>
</body>
</html>
