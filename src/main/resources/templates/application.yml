spring:
  application:
    name: educational-platform

  datasource:
    url: jdbc:mysql://localhost:3306/educational_platform?useSSL=false&serverTimezone=UTC
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8

  mvc:
    static-path-pattern: /static/**

server:
  port: 8080
  servlet:
    context-path: /

app:
  name: "Образовательная платформа для детей с ОВЗ"
  version: "1.0.0"
  description: "Инклюзивная образовательная среда"